<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaunchIn48 Mail Console</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a2340, #0d1124);
            min-height: 100vh;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 420px;
            background: rgba(255,255,255,0.08);
            padding: 35px;
            border-radius: 18px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0px 0px 25px rgba(0, 217, 255, 0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
            color: #09f2ff;
            text-shadow: 0 0 10px #00d2ff;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
        }

        textarea {
            resize: none;
            height: 130px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(135deg, #00eaff, #0077ff);
            color: white;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 157, 255, 0.5);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 157, 255, 0.8);
        }

        #response {
            text-align: center;
            margin-top: 18px;
            font-size: 15px;
        }

        .success {
            color: #00ffb3;
            text-shadow: 0 0 8px #00ffb3;
        }

        .error {
            color: #ff4e6e;
            text-shadow: 0 0 8px #ff4e6e;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>LaunchIn48 Mail Console</h2>

        <input id="to" type="email" placeholder="Recipient Email" required />
        <input id="subject" type="text" placeholder="Email Subject" required />
        <textarea id="otp" placeholder="Write your email message..."></textarea>

        <button onclick="sendMail()">Send Email</button>
        <p id="response"></p>
    </div>

<script>
async function sendMail() {
  const email = document.getElementById("to").value.trim();
  const otp = document.getElementById("otp").value.trim(); // or your field id
  const status = document.getElementById("response");

  if (!email || !otp) {
    status.innerText = "Please enter email and OTP.";
    status.style.color = "salmon";
    return;
  }

  status.innerText = "Sending...";
  status.style.color = "#09f2ff";

  try {
    const res = await fetch("/api/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });

    // if not ok, show server text for debugging
    if (!res.ok) {
      const txt = await res.text();
      status.innerText = `Server Error ${res.status}: ${txt}`;
      status.style.color = "salmon";
      return;
    }

    const data = await res.json();
    if (data.success) {
      status.innerText = "✓ OTP Sent!";
      status.style.color = "#00ffb3";
    } else {
      status.innerText = "Failed: " + (data.error || "unknown");
      status.style.color = "salmon";
    }
  } catch (err) {
    console.error("Fetch error:", err);
    status.innerText = "Network error: " + err.message;
    status.style.color = "salmon";
  }
}
</script>
</body>
</html>
