<!DOCTYPE html>
<html>
<head>
    <title>Payment Diagnosis</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .step { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Payment Diagnosis Tool</h1>
    
    <div class="step">
        <h3>Step 1: Check Environment Variables</h3>
        <button onclick="testStep(1)">Run Test</button>
        <div id="result1"></div>
    </div>
    
    <div class="step">
        <h3>Step 2: Test Razorpay Instance Creation</h3>
        <button onclick="testStep(2)">Run Test</button>
        <div id="result2"></div>
    </div>
    
    <div class="step">
        <h3>Step 3: Test Order Creation</h3>
        <button onclick="testStep(3)">Run Test</button>
        <div id="result3"></div>
    </div>

    <script>
        async function testStep(step) {
            const resultDiv = document.getElementById(`result${step}`);
            resultDiv.innerHTML = '<p>Testing...</p>';
            resultDiv.className = 'step';
            
            try {
                const response = await fetch('/api/diagnose-payment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ step })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<pre class="error">${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Error: ${error.message}</pre>`;
                resultDiv.className = 'step error';
            }
        }
    </script>
</body>
</html>
